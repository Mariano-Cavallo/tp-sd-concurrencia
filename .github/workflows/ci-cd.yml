name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  gitleaks:
    name: Detectar secrets hardcodeados
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: Test 
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install requests pytest

      - name: Pull de las imágenes necesarias
        run: |
          docker pull marianocavallo/server:latest
          docker pull marianocavallo/servicio-tarea:latest

      - name: Ejecutar test 
        run: pytest hit1/tests/test.py -v
      
      - name: Ver logs del servidor
        if: always()          # corre aunque el test falle
        run: docker logs servidor-test || true
  
  tests-hit2:
    name: Test hit2
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install requests pytest

      - name: Pull servicio-tarea
        run: docker pull marianocavallo/servicio-tarea:latest

      - name: Build imagen servidor hit2
        run: docker build -t servidor ./hit2/servidor

      - name: Ejecutar test hit2
        run: pytest hit2/tests/test.py -v

      - name: Ver logs del servidor
        if: always()
        run: docker logs servidor-test || true

  tests-hit3:
    name: Test hit3
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install requests pytest

      - name: Pull servicio-tarea
        run: docker pull marianocavallo/servicio-tarea:latest

      - name: Build imagen worker (servidor-local)
        run: docker build -t servidor-local ./hit1/servidor

      - name: Build imagen nodo Bully
        run: docker build -t bully-node ./hit3/node

      - name: Ejecutar test hit3
        run: pytest hit3/tests/test.py -v

      - name: Ver logs de los nodos
        if: always()
        run: |
          docker logs node1 || true
          docker logs node2 || true
          docker logs node3 || true

  build-and-push:
    name: Build y Push a Docker Hub
    runs-on: ubuntu-latest
    needs: [tests, tests-hit2, tests-hit3]

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push - server
        uses: docker/build-push-action@v5
        with:
          context: ./hit1/servidor
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/server:latest

      - name: Build y Push - Servicio Tarea
        uses: docker/build-push-action@v5
        with:
          context: ./hit1/servicio-tarea
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-tarea:latest