name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  gitleaks:
    name: Detectar secrets hardcodeados
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build-and-push:
    name: Build y Push a Docker Hub
    runs-on: ubuntu-latest
    needs: gitleaks          # solo buildea si gitleaks pasó

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push - server
        uses: docker/build-push-action@v5
        with:
          context: ./hit1/servidor
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/server:latest

      - name: Build y Push - Servicio Tarea
        uses: docker/build-push-action@v5
        with:
          context: ./hit1/servicio-tarea
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-tarea:latest