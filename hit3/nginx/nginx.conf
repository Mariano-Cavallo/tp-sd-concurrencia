events {}

http {
    upstream coordinators {
        server node1:5000;
        server node2:5000;
        server node3:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://coordinators;
            proxy_connect_timeout 2s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout;
        }
    }
}
